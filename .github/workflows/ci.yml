name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Unit tests
        run: dotnet test tests/Hopscope.Engine.Tests -c Release

  aot-footprint:
    name: aot-footprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Builds the chiseled-AOT image, which runs the Native-AOT publish inside the
      # SDK-AOT image (no clang/zlib setup needed on the runner). The publish uses
      # TreatWarningsAsErrors (see Dockerfile), so ANY trim/AOT warning fails this job.
      - name: Build engine image (AOT publish, warning-free gate)
        run: docker build -f src/engine/Hopscope.Host/Dockerfile -t hopscope-engine:ci .
      - name: Assert image < 60 MB
        run: |
          BYTES=$(docker image inspect hopscope-engine:ci --format '{{.Size}}')
          # Decimal MB (bytes / 1e6) — matches `docker images` and the architecture's
          # literal "< 60 MB" gate. (Binary MiB would let ~62.9 MB through.)
          MB=$(( BYTES / 1000 / 1000 ))
          echo "Engine image size: ${MB} MB (${BYTES} bytes, decimal MB)"
          if [ "$MB" -ge 60 ]; then
            echo "::error::Engine image ${MB} MB exceeds the 60 MB footprint gate"
            exit 1
          fi

  ui:
    name: ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
