# Standalone NO-CODE proof stack for the eBPF agent (Phase 5, Redis-RESP slice).
#
# Unlike the base docker-compose.yml, here the engine has NO Redis provider (no
# HOPSCOPE_REDIS_URL) and Redis runs with keyspace notifications OFF. So any Redis hop
# that appears on /snapshot can ONLY have come from the agent's kernel capture — the
# headline: the target did not cooperate, yet it still rendered.
#
#   docker compose -f deploy/docker-compose.agent.yml up -d --build --wait
#   bash deploy/e2e/agent-redis-check.sh
#
# Requires a Linux kernel with BTF + privileged Docker. fentry makes the agent arch-portable,
# so this runs on the amd64 CI runner AND on Docker Desktop for Mac (its LinuxKit kernel has BTF).
services:
  redis:
    image: redis:7-alpine
    container_name: hopscope-redis
    # Default redis-server: keyspace-event notifications are OFF (no --notify-keyspace-events).
    # The engine has no Redis provider anyway — this makes "the target did not cooperate" explicit.
    command: ["redis-server"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  engine:
    build:
      context: ..
      dockerfile: src/engine/Hopscope.Host/Dockerfile
    container_name: hopscope-engine
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      # Agent gRPC receiver ON; NO HOPSCOPE_REDIS_URL / RABBITMQ / OTLP — the agent is the only source.
      HOPSCOPE_AGENT_ENABLED: "true"
    ports:
      - "8085:8080"
      - "4318:4318"   # Agent gRPC (h2c)
    depends_on:
      redis:
        condition: service_healthy

  agent:
    build:
      context: ..
      dockerfile: src/agent/Dockerfile
    container_name: hopscope-agent
    # eBPF fentry load needs privileges + kernel BTF. The hook is kernel-global, so the
    # agent captures redis-cli's commands even though redis-cli runs in a different container.
    # No host networking needed (capture is global); on the bridge net the agent resolves engine:4318.
    privileged: true
    pid: host
    volumes:
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - /sys/fs/bpf:/sys/fs/bpf
    environment:
      HOPSCOPE_AGENT_TARGET: "engine:4318"
    depends_on:
      - engine
      - redis
