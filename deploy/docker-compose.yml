# Local Hopscope sprint stack: the engine + the React UI + a real RabbitMQ broker.
#   docker compose -f deploy/docker-compose.yml up --build
# Then open the live canvas at  http://localhost:8080  and publish/consume
# messages on RabbitMQ to watch the topology build itself. The engine's raw
# endpoints stay available at  http://localhost:8085/snapshot  and  ws://localhost:8085/ws .
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hopscope-rabbitmq
    # A non-"guest" user is NOT subject to RabbitMQ's loopback-only restriction,
    # so the engine container can reach the Management API across the bridge net.
    environment:
      RABBITMQ_DEFAULT_USER: hopscope
      RABBITMQ_DEFAULT_PASS: hopscope
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management API + UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: hopscope-redis
    # KEA = Keyspace + Events + All-commands → publishes __keyevent@<db>__:<event>
    # notifications the engine's RedisIngestor PSUBSCRIBEs to.
    command: ["redis-server", "--notify-keyspace-events", "KEA"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  engine:
    build:
      context: ..
      dockerfile: src/engine/Hopscope.Host/Dockerfile
    container_name: hopscope-engine
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      HOPSCOPE_RABBITMQ_URL: "http://hopscope:hopscope@rabbitmq:15672"
      HOPSCOPE_RABBITMQ_POLL_SECONDS: "2"
      # Redis tap — keyevent notifications normalize to Redis Topic nodes, co-rendering
      # with RabbitMQ on the same canvas (the Phase-4 multi-broker seam proof).
      HOPSCOPE_REDIS_URL: "redis://redis:6379"
      # OTLP gRPC trace receiver on :4317 — span→hop with real per-trace Failed + ErrorDetails,
      # co-rendering with RabbitMQ + Redis (+ Kafka via the overlay) on one canvas. The
      # in-proc receiver re-binds both the :8080 HTTP/1.1 and :4317 HTTP/2 listeners explicitly
      # (see Program.cs) so the WS/REST control-plane stays up alongside gRPC.
      HOPSCOPE_OTLP_ENABLED: "true"
      # Remote-agent gRPC receiver on :4318 — the Phase-5 no-code seam. The engine hosts the
      # client-streaming hopscope.v1.Ingestion/Stream RPC; the Go eBPF agent (or agent-check.sh
      # via grpcurl) streams normalized envelopes through the SAME IEventIngestor path every
      # in-proc provider uses, co-rendering on one canvas. Distinct port from OTLP's 4317.
      HOPSCOPE_AGENT_ENABLED: "true"
    ports:
      - "8085:8080"
      - "4317:4317"   # OTLP gRPC (h2c) — for OTLP exporters running on the host
      - "4318:4318"   # Agent gRPC (h2c) — for the remote eBPF agent / agent-check.sh
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: ..
      dockerfile: src/ui/Dockerfile
    container_name: hopscope-ui
    # nginx serves the SPA and reverse-proxies /ws + /snapshot to engine:8080,
    # so the browser stays same-origin and the engine needs no CORS.
    ports:
      - "8080:80"
    depends_on:
      - engine
