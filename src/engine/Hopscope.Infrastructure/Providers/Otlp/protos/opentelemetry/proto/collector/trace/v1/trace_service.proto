syntax = "proto3";

package opentelemetry.proto.collector.trace.v1;

import "opentelemetry/proto/trace/v1/trace.proto";

option java_multiple_files = true;
option java_package = "io.opentelemetry.proto.collector.trace.v1";
option java_outer_classname = "TraceServiceProto";
option go_package = "go.opentelemetry.io/proto/otlp/collector/trace/v1";
option csharp_namespace = "OpenTelemetry.Proto.Collector.Trace.V1";

// Service that can be used to push spans between one Application
// instrumented with OpenTelemetry and a collector, or between a collector and a
// central collector (in this case spans are sent/received to/from multiple
// Applications).
service TraceService {
  // For performance reasons, it is recommended to keep this RPC
  // always open and document as much as possible. Permanent open RPC will
  // allow inverse gRPC direction and enable more efficient security
  // (including mTLS).
  rpc Export(ExportTraceServiceRequest) returns (ExportTraceServiceResponse) {}
}

message ExportTraceServiceRequest {
  // An array of ResourceSpans.
  // For data coming from a single resource this array will typically contain
  // one element. Intermediary nodes that receive data from multiple origins
  // typically batch the data before forwarding further and in that case this
  // array will contain multiple elements.
  repeated opentelemetry.proto.trace.v1.ResourceSpans resource_spans = 1;
}

message ExportTraceServiceResponse {
  // The details of a partially successful export request.
  //
  // If the request is only partially accepted
  // (i.e. when the server accepts only parts of the data and rejects the rest)
  // the server MUST initialize the `partial_success` field and MUST
  // set the `rejected_spans` with the number of spans it rejected.
  //
  // Servers MAY also make use of the `partial_success` field to convey
  // warnings/suggestions to senders even when the request was fully accepted.
  // In such cases, the `rejected_spans` MUST have a value of `0` and the
  // `error_message` MUST be non-empty.
  //
  // A `partial_success` message with an empty value (rejected_spans = 0 and
  // error_message = "") is equivalent to it not being set/present. Senders
  // SHOULD interpret it the same way as in the full success case.
  ExportTracePartialSuccess partial_success = 1;
}

message ExportTracePartialSuccess {
  // The number of valid spans that were rejected. Senders SHOULD interpret this
  // as the number of spans that were not persisted.
  //
  // A value of `0` indicates that all received spans were successfully processed.
  int64 rejected_spans = 1;

  // A developer-facing human-readable message in English. It should be used
  // either to explain why the server rejected parts of the data during a partial
  // success or to convey warnings/suggestions during a full success.
  //
  // The message should offer guidance to users about how to fix the problem.
  //
  // This field is optional and SHOULD only be used to convey additional information
  // about the success/failure, especially if there is a mix of successes and failures.
  string error_message = 2;
}
