# Serves the built SPA and reverse-proxies the engine, so the browser always
# talks to its own origin (no CORS needed on the engine). `engine` resolves on
# the docker-compose network.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Live push stream — WebSocket upgrade to the engine.
    location /ws {
        proxy_pass http://engine:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        # Don't drop an idle delta stream — nginx's default proxy_read_timeout is 60s.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST snapshot (fallback / debugging).
    location /snapshot {
        proxy_pass http://engine:8080/snapshot;
        proxy_set_header Host $host;
    }

    # SPA fallback — every other path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
